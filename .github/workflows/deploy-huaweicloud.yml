name: Deploy to HuaweiCloud

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ${{ secrets.HUAWEI_SWR_REGISTRY }}
  ORG: ${{ secrets.HUAWEI_SWR_ORG }}
  IMAGE_NAME: zy_2606_trae_01
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Huawei SWR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HUAWEI_SWR_USERNAME }}
          password: ${{ secrets.HUAWEI_SWR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    name: Deploy to ECS
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HUAWEI_ECS_HOST }}
          username: ${{ secrets.HUAWEI_ECS_USERNAME }}
          key: ${{ secrets.HUAWEI_ECS_SSH_KEY }}
          port: ${{ secrets.HUAWEI_ECS_PORT || 22 }}
          script: |
            docker login ${{ env.REGISTRY }} -u ${{ secrets.HUAWEI_SWR_USERNAME }} -p ${{ secrets.HUAWEI_SWR_PASSWORD }}
            docker pull ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            docker stop zy_2606_trae_01 || true
            docker rm zy_2606_trae_01 || true
            docker run -d \
              --name zy_2606_trae_01 \
              --restart unless-stopped \
              -p 80:80 \
              --health-cmd="wget --spider -q http://localhost/healthz || exit 1" \
              --health-interval=30s \
              --health-timeout=5s \
              --health-retries=3 \
              ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            docker image prune -f

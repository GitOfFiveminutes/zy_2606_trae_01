version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: zy_2606_trae_01:latest
    container_name: zy_2606_trae_01
    restart: unless-stopped
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - webnet

networks:
  webnet:
    driver: bridge
